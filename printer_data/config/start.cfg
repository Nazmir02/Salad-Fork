[gcode_macro PRINT_START]
gcode:
    # --- Visual ---
    LED_PRINTING

    # --- Init ---
    M117 Initializing...
    SET_GCODE_OFFSET Z=0
    G90

    # --- Home X/Y only ---
    M117 Homing X...
    HOME_X_MOVE

    M117 Homing Y...
    HOME_Y_MOVE

    # ❌ REMOVE THIS (was causing error)
    # G1 Z20 F3000

    # --- Preheat ---
    M117 Heating Bed...
    M104 S150
    M190 S{target_bed}

    # --- Gantry Level ---
    M117 Gantry Leveling...
    QUAD_GANTRY_LEVEL

    # --- Stabilize Nozzle ---
    M117 Stabilizing Nozzle...
    M109 S150

    # --- NOW we can home Z ---
    M117 Z Homing...
    CARTOGRAPHER_TOUCH_HOME

    # ✅ NOW Z moves are allowed
    G1 Z20 F3000

    # --- Bed Mesh ---
    M117 Bed Meshing...
    BED_MESH_CALIBRATE ADAPTIVE=1

    # --- Final Heat ---
    M117 Heating Nozzle...
    M104 S{target_extruder}
    M109 S{target_extruder}

    # --- Move to start ---
    M117 Positioning...
    G1 Z5 F3000
    G1 X5 Y5 F5000

    # --- Prime ---
    M117 Priming...
    G92 E0
    G1 Z0.28
    G1 X200 E15 F1500
    G1 X220 F5000
    G92 E0

    # --- Start print ---
    M117 Printing...