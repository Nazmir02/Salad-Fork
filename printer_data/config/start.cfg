[gcode_macro PRINT_START]
gcode:
    LED_PRINTING

    M117 Initializing...
    SET_GCODE_OFFSET Z=0
    G90

    # --- Home X/Y ---
    M117 Homing X...
    HOME_X_MOVE

    M117 Homing Y...
    HOME_Y_MOVE

    # --- Preheat (from slicer) ---
    M117 Waiting Bed...
    M190 S{printer.heater_bed.target}

    # --- Heat nozzle slightly ---
    M117 Stabilizing Nozzle...
    M109 S150

    # ✅ HOME Z FIRST (THIS FIXES YOUR ERROR)
    M117 Z Homing...
    CARTOGRAPHER_TOUCH_HOME

    # --- NOW gantry leveling is safe ---
    M117 Gantry Leveling...
    QUAD_GANTRY_LEVEL

    # --- Safe Z move ---
    G1 Z20 F3000

    # --- Bed mesh ---
    M117 Bed Meshing...
    BED_MESH_CALIBRATE ADAPTIVE=1

    # --- Final nozzle temp ---
    M117 Final Heating...
    M109 S{printer.extruder.target}

    # --- Move to start ---
    M117 Positioning...
    G1 Z5 F3000
    G1 X5 Y5 F5000

    # -----------------------------
    # 9️⃣ Move & purge
    # -----------------------------
    SMART_PARK
    LINE_PURGE

    M117 Printing...