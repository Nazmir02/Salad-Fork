[gcode_macro PRINT_START]
gcode:
    LED_PRINTING

    M117 Initializing...
    SET_GCODE_OFFSET Z=0
    G90
    # -----------------------------
    #  Home X/Y
    # -----------------------------
    M117 Homing X...
    HOME_X_MOVE

    M117 Homing Y...
    HOME_Y_MOVE
    
    # -----------------------------
    # 1 - Heat Bed
    # -----------------------------
    M117 Waiting Bed...
    M190 S{printer.heater_bed.target}
    
    # -----------------------------
    # 2 - Pre Heat Nozzle
    # -----------------------------
    M117 Stabilizing Nozzle...
    M109 S150
    
    # -----------------------------
    # 3 - Nozzle Tap
    # -----------------------------
    M117 Z Homing...
    CARTOGRAPHER_TOUCH_HOME
    
    # -----------------------------
    # 4 - QGL
    # -----------------------------
    M117 Gantry Leveling...
    QUAD_GANTRY_LEVEL
    
    # -----------------------------
    # 5 - Safe Z
    # -----------------------------
    G1 Z20 F3000
    
    # -----------------------------
    # 6 - Mesh
    # -----------------------------
    M117 Bed Meshing...
    BED_MESH_CALIBRATE ADAPTIVE=1

    # -----------------------------
    # 8 - Final Nozzle temp
    # -----------------------------
    M117 Final Heating...
    M109 S{printer.extruder.target}

    # -----------------------------
    # 9️ - Move & purge
    # -----------------------------
    SMART_PARK
    LINE_PURGE

    M117 Printing...