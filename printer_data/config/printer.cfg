[include mainsail.cfg]
[include start.cfg]
[include end.cfg]
[include macro.cfg]
[include Shaketune.cfg]
[include KAMP_Settings.cfg]
[include Neopixel.cfg]
[exclude_object]


#####################################################################################
#	                         MCU
#####################################################################################

[mcu]
canbus_uuid: d1e535af4ffe
#serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_2E0035000750324256343520-if00

[mcu EBBCan]
canbus_uuid: 3884b7cbc8b7



####################################################################################
#	                              Printer
####################################################################################


[printer]
kinematics: corexy
max_velocity: 350
max_accel: 3000
square_corner_velocity: 8
max_z_velocity: 50
max_z_accel: 350


####################################################################################
#	                              Cartographer V4
####################################################################################

[mcu cartographer] 
serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_3C002C001850303655333520-if00
restart_method: command 

[cartographer]
mcu: cartographer
x_offset: 0 
y_offset: 20 
verbose: no 

[bed_mesh]
zero_reference_position: 125, 125 # The centre of your bed. 
speed: 300
horizontal_move_z: 3
mesh_min: 5, 5 
mesh_max: 200, 200 
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0,0 

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105


####################################################################################
#	                              Input Shaper 
####################################################################################

[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: x,y,z

[resonance_tester]
probe_points: 100, 100, 25
accel_chip: adxl345 
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0

[input_shaper]
shaper_freq_x: 60.4
shaper_type_x: ei
damping_ratio_x:0.080
shaper_freq_y: 39.2
shaper_type_y: mzv
damping_ratio_y:0.040

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

#   B(X) ---------A(Y)
#   |                |
#   |--------E-------|
#   |                |
#   |                |
#   |                |
#                 

####################################################################################
##                   X-axis on MOTOR_0(B Motor)
####################################################################################


[stepper_x]
step_pin: PC14
dir_pin: PC13
enable_pin: !PC15
microsteps: 16
rotation_distance: 40
endstop_pin:  EBBCan: PB6
position_min: 0
position_endstop: 250
position_max: 250
homing_speed: 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]   
uart_pin: PE6         
interpolate: true     
run_current: 0.8      
hold_current: 0.8     
sense_resistor: 0.110 
stealthchop_threshold: 0

[stepper_y]
step_pin: PE5
dir_pin: PE4
enable_pin: !PC15
microsteps: 16
rotation_distance: 40
endstop_pin: PA15
position_min: 0
position_endstop: 280
position_max: 280
homing_speed: 100
homing_retract_dist: 5
homing_positive_dir: true


[tmc2209 stepper_y]   
uart_pin: PE3         
interpolate: true     
run_current: 0.8      
hold_current: 0.8     
sense_resistor: 0.110 
stealthchop_threshold: 0

#--------------------------------------------------------------------#

[stepper_z]
step_pin: PE1
dir_pin: PE0
enable_pin: !PE2
microsteps: 32
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop 
position_max: 230
position_min: -2
homing_speed: 15.0
second_homing_speed: 3.0
homing_retract_dist: 0

[tmc2209 stepper_z]   
uart_pin: PB7         
interpolate: true     
run_current: 0.9     
hold_current: 0.8     
sense_resistor: 0.110 
stealthchop_threshold: 0

#--------------------------------------------------------------------#

[stepper_z1]
step_pin: PD2                #PB5
dir_pin:  PD1                #PB4
enable_pin: !PD3              #!PB6
microsteps: 32
rotation_distance: 8

[tmc2209 stepper_z1]   
uart_pin: PB3         
interpolate: true     
run_current: 0.9      
hold_current: 0.8     
sense_resistor: 0.110 
stealthchop_threshold: 0

#--------------------------------------------------------------------#

[stepper_z2]
step_pin: PD6
dir_pin: PD5
enable_pin: !PD7
microsteps: 32
rotation_distance: 8

[tmc2209 stepper_z2]   
uart_pin: PD4         
interpolate: true     
run_current: 0.9     
hold_current: 0.8     
sense_resistor: 0.110 
stealthchop_threshold: 0

#--------------------------------------------------------------------#

[stepper_z3]
step_pin: PB5                         #PD2
dir_pin:  PB4                        #PD1
enable_pin: !PB6                     #!PD3
microsteps: 32
rotation_distance: 8

[tmc2209 stepper_z3]   
uart_pin: PD0         
interpolate: true     
run_current: 0.9      
hold_current: 0.8     
sense_resistor: 0.110 
stealthchop_threshold: 0

#--------------------------------------------------------------------#

#####################################################################
# 	Extruder
#####################################################################

[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: EBBCan: PD2
microsteps: 16
rotation_distance: 22.67895 
gear_ratio: 50:10
nozzle_diameter: 0.400
full_steps_per_rotation: 200
filament_diameter: 1.750
max_extrude_only_distance: 780.0
heater_pin: EBBCan: PB13
max_power: 1.0
sensor_type: ATC Semitec 104GT-2
sensor_pin: EBBCan: PA3
smooth_time: 3.0
min_extrude_temp: 170
min_temp: 0
max_temp: 270
max_extrude_only_velocity: 120.0
pressure_advance: 0.021
pressure_advance_smooth_time: 0.0335
max_extrude_cross_section: 5.0

####################################################################################
#	                         Firmware Retraction 
####################################################################################

[firmware_retraction]
retract_length: 1.0                                                        
retract_speed: 20                                                          
unretract_extra_length: 0
unretract_speed: 20 


#####################################################################
 #	Probe
#####################################################################

#[probe]
#pin: PA8
#x_offset: 0.0
#y_offset: 25.0
#z_offset: 0.00
#speed: 2.0
#samples: 4
#sample_retract_dist: 6.0

#####################################################################
# 	Fan Control 
#####################################################################

[fan]
# Print cooling fan
pin: EBBCan: PA1
max_power: 1.0
kick_start_time: 0.5                                                
off_below: 0.13
cycle_time: 0.010

[heater_fan hotend_fan]
# Hotend fan
pin: EBBCan: PA0
kick_start_time: 0.500
heater: extruder
heater_temp: 50.0

#[heater_fan controller_fan]
# Controller fan
#pin: 
#kick_start_time: 0.500
#heater: heater_bed
#heater_temp: 45.0



#####################################################################
# 	Bed Heater
#####################################################################


[heater_bed]
heater_pin: PB10
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PC0
smooth_time: 3.0
max_power: 0.75
control: pid
pid_Kp: 47.690
pid_Ki: 1.556
pid_Kd: 365.338
min_temp: 0
max_temp: 110

[homing_override]
axes: z
set_position_z: 0
gcode:
   G90
   G0 Z5 F600
   HOME_X_MOVE
   HOME_Y_MOVE
   G0 X100 Y100 F3600
#   XY Location of the FSR Switch
   G28 Z
   G0 Z10 F600
   G0 X100 Y100 Z20 F600

[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: _QUAD_GANTRY_LEVEL
gcode:
    SAVE_GCODE_STATE NAME=STATE_QGL
    BED_MESH_CLEAR
    {% if not printer.quad_gantry_level.applied %}
      _QUAD_GANTRY_LEVEL horizontal_move_z=10 retry_tolerance=1
    {% endif %}
    _QUAD_GANTRY_LEVEL horizontal_move_z=2
    G28 Z
    RESTORE_GCODE_STATE NAME=STATE_QGL

[idle_timeout]
timeout: 1800


[quad_gantry_level]
#   Use QUAD_GANTRY_LEVEL to level a gantry.
gantry_corners:
   10, 30
   200, 230
#   Min & Max gantry corners - measure from nozzle at MIN (0,0) and MAX (250,250) to respective belt positions
points:
   10, 30
   10, 230
   200, 230
   200, 30
#   Probe points

speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.1
max_adjust: 10

