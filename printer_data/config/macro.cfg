[gcode_macro UNLOAD_FILAMENT]
gcode:
    M83
    G1 E10 F300
    G1 E-780 F1800
    M82

[gcode_macro LOAD_FILAMENT]
gcode:
    M83
    G1 E750 F1800
    G1 E30 F300
    G1 E15 F150
    M82

[gcode_macro G32]
gcode:
    G28
    QUAD_GANTRY_LEVEL
    QUAD_GANTRY_LEVEL
    G0 X125 Y125 Z20 F6000

##############################################
[gcode_macro PID_E]

gcode:

    PID_CALIBRATE HEATER=extruder TARGET=210
    TURN_OFF_HEATERS
    SAVE_CONFIG
 


##############################################
[gcode_macro PID_BED]

gcode:

    PID_CALIBRATE HEATER=heater_bed TARGET=50
    TURN_OFF_HEATERS
    SAVE_CONFIG

#####################################################################
#  Custom Macros
#####################################################################

[gcode_macro HOME_X_MOVE]
gcode:
    G28 X
    G0 X100 F6000

[gcode_macro HOME_Y_MOVE]
gcode:
    G28 Y
    G0 Y100 F6000

[gcode_macro HOME_ALL_CUSTOM]
gcode:
    G90

    # Home X then move to 100
    HOME_X_MOVE

    # Home Y then move to 100
    HOME_Y_MOVE

    # Move to center for Z probing
    G0 X125 Y125 F6000

    # Home Z using Cartographer
    G28 Z
    G0 Z10 F1800