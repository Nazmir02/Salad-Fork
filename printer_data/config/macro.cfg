[gcode_macro UNLOAD_FILAMENT]
gcode:
    M83
    G1 E10 F300
    G1 E-780 F1800
    M82

[gcode_macro LOAD_FILAMENT]
gcode:
    M83
    G1 E750 F1800
    G1 E30 F300
    G1 E15 F150
    M82

[gcode_macro G32]
gcode:
    G28
    QUAD_GANTRY_LEVEL
    QUAD_GANTRY_LEVEL
    G0 X130 Y130 Z20 F6000

##############################################
[gcode_macro PID_E]

gcode:

    PID_CALIBRATE HEATER=extruder TARGET=210
    TURN_OFF_HEATERS
    SAVE_CONFIG
 


##############################################
[gcode_macro PID_BED]

gcode:

    PID_CALIBRATE HEATER=heater_bed TARGET=50
    TURN_OFF_HEATERS
    SAVE_CONFIG

#####################################################################
#  Custom Homing Macros
#####################################################################

[gcode_macro HOME_X_MOVE]
gcode:
    G28 X
    G0 X130 F6000

[gcode_macro HOME_Y_MOVE]
gcode:
    G28 Y
    G0 Y130 F6000

[gcode_macro HOME_ALL_CUSTOM]
gcode:
    G90

    # Home X then move to 100
    HOME_X_MOVE

    # Home Y then move to 100
    HOME_Y_MOVE

    # Move to center for Z probing
    G0 X130 Y30 F6000

    # Home Z using Cartographer
    G28 Z
    G0 Z10 F1800

#####################################################################
#  Neopixel
#####################################################################

[delayed_gcode LED_BOOT]
initial_duration: 2
gcode:
    LED_WELCOME


[gcode_macro LED_WELCOME]
gcode:
    {% for i in range(0, 40) %}
        {% set v = i / 40 %}
        SET_LED LED=my_led RED={v*0.6} GREEN={v*0.6} BLUE=1.0
        G4 P40
    {% endfor %}

    LED_READY


#####################################################################
#  RGB IDLE BREATHING (SAFE - NO SIN)
#####################################################################

[gcode_macro LED_IDLE]
variable_brightness: 0.0
variable_direction: 1
gcode:
    UPDATE_DELAYED_GCODE ID=LED_IDLE_LOOP DURATION=0.08


[delayed_gcode LED_IDLE_LOOP]
gcode:
    {% set b = printer["gcode_macro LED_IDLE"].brightness %}
    {% set d = printer["gcode_macro LED_IDLE"].direction %}

    {% set b = b + (0.04 * d) %}

    {% if b >= 1.0 %}
        {% set b = 1.0 %}
        {% set d = -1 %}
    {% elif b <= 0.0 %}
        {% set b = 0.0 %}
        {% set d = 1 %}
    {% endif %}

    SET_GCODE_VARIABLE MACRO=LED_IDLE VARIABLE=brightness VALUE={b}
    SET_GCODE_VARIABLE MACRO=LED_IDLE VARIABLE=direction VALUE={d}

    # 🌈 SAFE RGB breathing (NO math functions)
    SET_LED LED=my_led RED={b * 0.3} GREEN={(1 - b) * 0.2} BLUE={(0.5 - b) * 0.2 + 0.1}

    UPDATE_DELAYED_GCODE ID=LED_IDLE_LOOP DURATION=0.08

#####################################################################

#  Heating 
#####################################################################

[gcode_macro LED_HEATING]
gcode:
    {% set t = printer.extruder.temperature %}
    {% set max = 240 %}
    {% set r = t / max %}

    {% if r > 1 %}
        {% set r = 1 %}
    {% endif %}

    SET_LED LED=my_led RED={r} GREEN={0.2} BLUE={1 - r}
    
#####################################################################

[gcode_macro LED_READY]
gcode:
    SET_LED LED=my_led RED=0.6 GREEN=0.6 BLUE=0.6

[gcode_macro LED_PRINTING]
gcode:
    {% for i in range(0, 15) %}
        SET_LED LED=my_led INDEX={i+1} RED=0 GREEN=0.6 BLUE=1
        G4 P20
    {% endfor %}

[gcode_macro LED_HOTEND]
gcode:
    {% set t = printer.extruder.temperature %}
    {% set max = 240 %}
    {% set ratio = t / max %}

    {% if ratio > 1 %}
        {% set ratio = 1 %}
    {% endif %}

    SET_LED LED=my_led RED={ratio} GREEN=0.2 BLUE={1 - ratio}

[gcode_macro LED_ERROR]
gcode:
    {% for i in range(0, 6) %}
        SET_LED LED=my_led RED=1 GREEN=0 BLUE=0
        G4 P200
        SET_LED LED=my_led RED=0 GREEN=0 BLUE=0
        G4 P200
    {% endfor %}

[delayed_gcode LED_STARTUP]
initial_duration: 2
gcode:
    {% for i in range(0, 20) %}
        {% set v = i/20 %}
        SET_LED LED=my_led RED={v*0.6} GREEN={v*0.6} BLUE=1
        G4 P50
    {% endfor %}
    LED_IDLE

[gcode_macro LED_PRINTING]
gcode:
    # Stop idle breathing
    UPDATE_DELAYED_GCODE ID=LED_IDLE_LOOP DURATION=0

    # Nice progressive blue animation
    {% for i in range(0, 15) %}
        SET_LED LED=my_led INDEX={i+1} RED=0 GREEN=0.6 BLUE=1
        G4 P20
    {% endfor %}

[gcode_macro LUBE_Z]
description: Cycle Z up/down for lead screw lubrication
gcode:
    {% set TOP = params.TOP|default(170)|float %}
    {% set BOTTOM = params.BOTTOM|default(15)|float %}
    {% set COUNT = params.COUNT|default(4)|int %}
    {% set SPEED = params.SPEED|default(600)|int %}

    G90                         ; Absolute positioning

    HOME_X_MOVE                 ; Your custom X homing
    HOME_Y_MOVE                 ; Your custom Y homing
    G28 Z                       ; Only home Z (safe to keep standard)

    G1 Z{BOTTOM} F{SPEED}       ; Go near bottom

    {% for i in range(COUNT) %}
        G1 Z{TOP} F{SPEED}      ; Move up
        G1 Z{BOTTOM} F{SPEED}   ; Move down
    {% endfor %}

    G1 Z50 F{SPEED}             ; Leave in safe position

    M117 Z Lube Done

